<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twoje zamówienie — Konfigurator Półek</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f3f4f6;min-height:100vh;-webkit-font-smoothing:antialiased;color:#111827;overflow-x:hidden}

/* TOPBAR */
.topbar{background:#16a34a;border-bottom:none;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:100;width:100%;min-width:0;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;min-width:0;flex-shrink:0}
.logo-mark{width:34px;height:34px;background:rgba(255,255,255,0.2);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:18px;height:18px;fill:white}
.logo-name{font-size:.95rem;font-weight:600;color:#fff;letter-spacing:-.01em;white-space:nowrap}
.logo-name span{color:rgba(255,255,255,0.75)}
.topbar-tag{font-size:.7rem;font-weight:500;color:rgba(255,255,255,0.65);letter-spacing:.07em;text-transform:uppercase}

/* DESKTOP LAYOUT */
.page{max-width:1100px;margin:0 auto;padding:32px 24px 56px}
.layout{display:grid;grid-template-columns:1fr 380px;gap:24px;align-items:start}
.col-progress{grid-column:1;grid-row:1;display:flex;flex-direction:column;gap:20px}
.col-3d{grid-column:1;grid-row:2;display:flex;flex-direction:column;gap:20px}
.col-summary{grid-column:2;grid-row:1 / span 2;display:flex;flex-direction:column;gap:20px}
.col-contact{grid-column:2;grid-row:3;display:flex;flex-direction:column;gap:20px}

/* HERO — usunięty (szkic 3) */
.hero{display:none}

/* CARD */
.card{background:#fff;border-radius:18px;border:1px solid #e5e7eb;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.section{padding:20px 24px;border-bottom:1px solid #f3f4f6}
.section:last-child{border-bottom:none}
.sec-label{font-size:.68rem;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px}

/* PROGRESS — szkic B */
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-krok{font-size:.7rem;font-weight:600;color:#16a34a}
.progress-segments{display:flex;gap:5px;margin-bottom:10px}
.progress-segments div{flex:1;height:8px;border-radius:4px}
.progress-steps3{display:flex;margin-bottom:12px}
.progress-steps3>div{flex:1}
.ps-left{text-align:left}
.ps-center{text-align:center}
.ps-right{text-align:right}
.ps-name{font-size:.78rem;font-weight:600}
.ps-sub{font-size:.68rem;color:#6b7280;margin-top:1px}
.p-done{color:#16a34a}
.p-active{color:#374151}
.p-wait{color:#9ca3af}
.status-pill{display:inline-block;background:#fef3c7;color:#92400e;font-size:.7rem;font-weight:600;padding:4px 11px;border-radius:99px}

/* COUNTDOWN */
.countdown{display:flex;align-items:stretch;gap:8px;min-width:0}
.cd-box{flex:1;min-width:0;text-align:center;padding:14px 4px;border:1px solid #e5e7eb;border-radius:14px;background:#fafafa}
.cd-box.hl{border-color:#bbf7d0;background:#f0fdf4}
.cd-num{font-size:2.2rem;font-weight:600;color:#111827;line-height:1;letter-spacing:-.04em;font-variant-numeric:tabular-nums}
.cd-box.hl .cd-num{color:#15803d}
.cd-unit{font-size:.62rem;color:#9ca3af;margin-top:5px;letter-spacing:.07em;text-transform:uppercase;font-weight:500}
.cd-box.hl .cd-unit{color:#166534}
.cd-sep{display:flex;align-items:center;padding-bottom:20px;font-size:1.6rem;color:#d1d5db;font-weight:300;flex-shrink:0}

/* 3D VIEWER */
.viewer-wrap{position:relative;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;background:#f0f0f0;height:300px}
#shelfCanvas{display:block;width:100%!important;height:100%!important}
.voverlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#f0f0f0;transition:opacity .4s}
.voverlay.gone{opacity:0;pointer-events:none}
.spin{border:2px solid #e5e7eb;border-top-color:#16a34a;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.voverlay p{font-size:.75rem;color:#9ca3af}
.viewer-hint{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);color:white;font-size:.62rem;font-weight:500;padding:4px 11px;border-radius:99px;white-space:nowrap;letter-spacing:.04em;max-width:90%;overflow:hidden;text-overflow:ellipsis}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.chip{background:#f3f4f6;color:#6b7280;font-size:.68rem;font-weight:500;padding:4px 9px;border-radius:99px;border:1px solid #e5e7eb}
.chip.g{background:#f0fdf4;color:#166534;border-color:#bbf7d0}

/* DETAILS */
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.det-box{padding:10px 13px;border:1px solid #f3f4f6;border-radius:10px;background:#fafafa}
.det-box.full{grid-column:1/-1}
.det-lbl{font-size:.65rem;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em;font-weight:500}
.det-val{font-size:.85rem;font-weight:600;color:#111827;margin-top:3px}
.det-sub{font-size:.75rem;color:#9ca3af;margin-top:2px}

/* TRACKING */
.track-link{display:flex;align-items:center;gap:12px;padding:13px 15px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:11px;text-decoration:none;transition:background .15s}
.track-link:hover{background:#dcfce7}
.track-icon{width:38px;height:38px;background:#16a34a;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.track-icon svg{width:17px;height:17px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.track-lbl{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#166534}
.track-num{font-size:.88rem;font-weight:600;color:#14532d;margin-top:2px}

/* RIGHT COLUMN SUMMARY CARD */
.summary-card{background:#fff;border-radius:18px;border:1px solid #e5e7eb;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.sum-section{padding:18px 20px;border-bottom:1px solid #f3f4f6}
.sum-section:last-child{border-bottom:none}
.sum-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sum-row:last-child{margin-bottom:0}
.sum-lbl{font-size:.78rem;color:#6b7280}
.sum-val{font-size:.82rem;font-weight:600;color:#111827}
.sum-total{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:#f0fdf4;border-top:1px solid #bbf7d0}
.sum-total .lbl{font-size:.82rem;font-weight:500;color:#166534}
.sum-total .val{font-size:1.5rem;font-weight:600;color:#15803d;letter-spacing:-.02em}

/* CONTACT */
.contact-bar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;background:#14532d;gap:16px;flex-wrap:nowrap}
.contact-bar strong{display:block;font-size:.85rem;font-weight:600;color:white;margin-bottom:2px}
.contact-bar span{font-size:.72rem;color:rgba(255,255,255,.55);display:block}
.contact-email{display:flex;align-items:center;gap:10px;text-decoration:none;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:9px 16px;transition:background .15s;flex-shrink:0}
.contact-email:hover{background:rgba(255,255,255,.18)}
.contact-email span{font-size:.82rem;font-weight:600;color:white;white-space:nowrap}

/* STATES */
.state{min-height:55vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;gap:14px}
.state-icon{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center}
.state-title{font-size:1.4rem;font-weight:600;color:#111827}
.state-desc{font-size:.85rem;color:#6b7280;line-height:1.6;max-width:320px}

/* ─── MOBILE ─── */
@media(max-width:768px){
  .topbar{padding:0 14px;height:54px}
  #topbar-orderinfo{display:none!important}
  #topbar-statuspill{font-size:.65rem!important;padding:2px 8px!important;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .page{padding:12px 10px 40px;max-width:100vw;overflow-x:hidden}
  .layout{grid-template-columns:1fr;grid-template-rows:auto;gap:14px}
  .col-progress{grid-column:1;grid-row:auto;order:1}
  .col-summary{grid-column:1;grid-row:auto;order:2}
  .col-3d{grid-column:1;grid-row:auto;order:3}
  .col-contact{grid-column:1;grid-row:auto;order:4}
  .hero{display:none}
  .card,.summary-card{border-radius:14px}
  .section{padding:14px 16px}
  .countdown{gap:4px}
  .cd-num{font-size:1.4rem}
  .cd-sep{font-size:1rem;padding-bottom:14px}
  .cd-box{padding:8px 2px;border-radius:8px}
  .cd-unit{font-size:.55rem}
  .cd-box-sek{display:none}
  .cd-sep-sek{display:none}
  .viewer-wrap{height:220px}
  .sum-val{font-size:.78rem;word-break:break-word}
  .progress-steps3{font-size:.7rem}
  .ps-sub{font-size:.62rem}
}

footer{text-align:center;padding:24px;font-size:.7rem;color:#9ca3af}
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="2.5" rx="1.2"/><rect x="2" y="11" width="20" height="2.5" rx="1.2"/><rect x="2" y="17" width="20" height="2.5" rx="1.2"/><rect x="3.5" y="3" width="2" height="18" rx="1"/><rect x="18.5" y="3" width="2" height="18" rx="1"/></svg>
    </div>
    <span class="logo-name">Konfigurator<span>Półek</span></span>
  </a>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="topbar-orderinfo" style="font-size:.72rem;color:rgba(255,255,255,.75);font-weight:500;letter-spacing:.01em;"></span>
    <span id="topbar-statuspill" style="display:none;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.18);color:#fff;padding:3px 10px;border-radius:99px;border:1px solid rgba(255,255,255,.25);"></span>
  </div>
</header>

<div class="page"><div id="root"></div></div>
<footer>© 2025 KonfiguratorPółek · Wszystkie prawa zastrzeżone</footer>

<script>
const PROXY='https://baselinker-proxy.007lukasz-m.workers.dev';
const COLOR_HEX={'0':'#8B5A2B','1':'#FFFFFF','2':'#000000'};
const COLOR_LABEL={'0':'Dąb','1':'Biała','2':'Czarna'};
const TYPE_LABEL={s:'Stojąca',h:'Wisząca',m:'Na kubki',M:'Modułowa'};

function parseCode(raw){
  if(!raw)return null;
  const code=raw.trim(); // NIE lowercase - zachowaj 'M' vs 'm'
  const codeLow=code.toLowerCase();
  try{
    const p=code.split('-');
    const pLow=codeLow.split('-');

    // MODULARNY: format M-W44-H40-C20-D10-01-s
    if(p[0]==='M'&&p.length>=6){
      // p[1]=W44, p[2]=H40, p[3]=C20(connectingWidth), p[4]=D10(depth), p[5]=colorcodes, p[6]=options
      const col=p[5]||'01';
      const modW=p[1]?.toUpperCase().replace('W','');   // szerokość modułu
      const modH=p[2]?.toUpperCase().replace('H','');   // wysokość
      const connW=p[3]?.toUpperCase().replace('C','');  // szerokość półki łączącej
      const depthV=p[4]?.toUpperCase().replace('D',''); // głębokość
      return{type:'modular',typeLabel:'Modułowa',
        width:modW, height:modH, connectingWidth:connW, depth:depthV,
        shelfCount:null, isMugShelf:false, isModular:true,
        sideHex:COLOR_HEX[col[0]]||'#8B5A2B',shelfHex:COLOR_HEX[col[1]]||'#FFFFFF',
        sideLbl:COLOR_LABEL[col[0]]||'Dąb',shelfLbl:COLOR_LABEL[col[1]]||'Biała'};
    }

    if(p.length>=7){
      const sc=pLow[5],shc=pLow[6],optCode=pLow[7]||'';
      let cp=null;
      if(p[8]&&p[8].toLowerCase().startsWith('cp'))
        cp=p[8].substring(2).split('.').map(Number).filter(n=>!isNaN(n));

      const typeKey=pLow[0];
      const isMug = typeKey==='m';

      // Półka na kubki (m): optCode = mountCode(s/h) + dividerCodes(g/m/d)
      let divTop=false,divMid=false,divBot=false,mugMount='standing';
      if(isMug){
        mugMount = optCode.startsWith('h') ? 'hanging' : 'standing';
        divTop = optCode.includes('g');
        divMid = optCode.includes('m');
        divBot = optCode.includes('d');
      }

      const noTop = !isMug && optCode.includes('t');
      const noBottom = !isMug && optCode.includes('b');

      return{type:typeKey,
        typeLabel: isMug ? 'Na kubki' : (TYPE_LABEL[typeKey]||'Stojąca'),
        width:pLow[1],height:pLow[2],depth:pLow[3],shelfCount:pLow[4],
        customPositions:cp,noTop,noBottom,
        isMugShelf:isMug,mugMount,divTop,divMid,divBot,
        sideHex:COLOR_HEX[sc]||'#8B5A2B',shelfHex:COLOR_HEX[shc]||'#FFFFFF',
        sideLbl:COLOR_LABEL[sc]||'Dąb',shelfLbl:COLOR_LABEL[shc]||'Biała'};
    }
    return null;
  }catch(e){console.error('parseCode error:',e);return null;}
}

function getStep(name){
  const n=(name||'').toLowerCase();
  if(n.includes('wysłan')||n.includes('wyslano')||n.includes('shipped'))return 2;
  if(n.includes('do wysłania')||n.includes('do wyslania'))return 1;
  return 0; // nowe zamówienie = w realizacji
}

function calcDeliveryDate(ts, step){
  const d = step >= 1 ? new Date() : new Date(ts*1000);
  const daysToAdd = step >= 2 ? 2 : step === 1 ? 3 : 7;
  // krok 0 (realizacja) = +7 dni od złożenia
  // krok 1 (do wysłania) = +3 dni robocze od dziś (jutro wysyłka + 2 dni DPD)
  // krok 2 (wysłano) = +2 dni robocze od dziś (czas DPD)
  let added=0;
  while(added<daysToAdd){ d.setDate(d.getDate()+1); const dow=d.getDay(); if(dow!==0&&dow!==6) added++; }
  return d;
}

let cdInt=null;
function startCountdown(target){
  function upd(){
    const diff=target-new Date();
    if(diff<=0){['cd-d','cd-h','cd-m','cd-s'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent='00';});return;}
    const fmt=n=>String(n).padStart(2,'0');
    const get=id=>document.getElementById(id);
    if(get('cd-d'))get('cd-d').textContent=fmt(Math.floor(diff/86400000));
    if(get('cd-h'))get('cd-h').textContent=fmt(Math.floor((diff%86400000)/3600000));
    if(get('cd-m'))get('cd-m').textContent=fmt(Math.floor((diff%3600000)/60000));
    if(get('cd-s'))get('cd-s').textContent=fmt(Math.floor((diff%60000)/1000));
  }
  upd();if(cdInt)clearInterval(cdInt);cdInt=setInterval(upd,1000);
}

function build3D(canvas,cfg){
  const SC=0.1, TH=0.18;
  const cw=canvas.offsetWidth, ch=canvas.offsetHeight;
  const scene=new THREE.Scene(); scene.background=new THREE.Color(0xf0f0f0);
  const camera=new THREE.PerspectiveCamera(75,cw/ch,0.1,1000);
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setSize(cw,ch); renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  scene.add(new THREE.HemisphereLight(0xffffff,0x444444,1));
  const dir=new THREE.DirectionalLight(0xffffff,0.6); dir.position.set(4,8,3); scene.add(dir);
  const mkMat=()=>new THREE.MeshStandardMaterial({color:0x777777,metalness:0,roughness:0.6});
  const lineMat=new THREE.LineBasicMaterial({color:0x16a34a,linewidth:2});
  const grp=new THREE.Group();

  if(cfg.type==='modular'){
    // ── PÓŁKA MODUŁOWA: dwa moduły + łączące półki ──
    const mW=parseFloat(cfg.width)||44;
    const mH=parseFloat(cfg.height)||40;
    const cW=parseFloat(cfg.connectingWidth)||20; // szerokość półki łączącej
    const D2=parseFloat(cfg.depth)||10; // głębokość
    const D=10; // głębokość domyślna
    const wS=mW*SC, hS=mH*SC, dS=D2*SC, cS=cW*SC, tS=TH;
    let shelfNum=3;
    if(mH===40)shelfNum=2; if(mH===80)shelfNum=5;

    function createModule(xPos){
      const mg=new THREE.Group();
      const sGeo=new THREE.BoxGeometry(tS,hS,dS);
      const lS=new THREE.Mesh(sGeo.clone(),mkMat()); lS.position.set(-wS/2+tS/2,0,0); mg.add(lS);
      const rS=new THREE.Mesh(sGeo.clone(),mkMat()); rS.position.set(wS/2-tS/2,0,0); mg.add(rS);
      const iW=wS-2*tS;
      const pG=new THREE.BoxGeometry(iW,tS,dS);
      const btm=new THREE.Mesh(pG.clone(),mkMat()); btm.position.set(0,-hS/2+tS/2,0); btm.name='bottomPanel'; mg.add(btm);
      const top=new THREE.Mesh(pG.clone(),mkMat()); top.position.set(0,hS/2-tS/2,0); top.name='topPanel'; mg.add(top);
      if(shelfNum>0){
        const avail=hS-2*tS, gap=avail/(shelfNum+1);
        for(let i=1;i<=shelfNum;i++){
          const s=new THREE.Mesh(pG.clone(),mkMat());
          s.position.set(0,-hS/2+tS+gap*i,0); s.name=`s${i-1}`; mg.add(s);
        }
      }
      mg.position.x=xPos; return mg;
    }
    const leftM=createModule(-(cS/2+wS/2));
    const rightM=createModule(cS/2+wS/2);
    grp.add(leftM,rightM);
    // Łączące półki
    const cGeo=new THREE.BoxGeometry(cS,tS,dS);
    const yPositions=[];
    leftM.children.forEach(c=>{if(c.name==='topPanel'||c.name==='bottomPanel'||c.name?.startsWith('s'))yPositions.push(c.position.y);});
    yPositions.sort((a,b)=>b-a);
    for(let i=0;i<yPositions.length-1;i++){
      const mid=(yPositions[i]+yPositions[i+1])/2;
      const cs=new THREE.Mesh(cGeo.clone(),mkMat()); cs.position.set(0,mid,0); grp.add(cs);
    }

  } else {
    // ── ZWYKŁA / NA KUBKI / WISZĄCA / STOJĄCA ──
    const W=parseFloat(cfg.width)||44;
    const H=parseFloat(cfg.height)||60;
    const D=parseFloat(cfg.depth)||10;
    const N=parseInt(cfg.shelfCount)||0;
    const wS=W*SC, hS=H*SC, dS=D*SC, tS=TH;
    const iW=wS-2*tS;

    const sGeo=new THREE.BoxGeometry(tS,hS,dS);
    const lS=new THREE.Mesh(sGeo.clone(),mkMat()); lS.position.set(-wS/2+tS/2,0,0); grp.add(lS);
    const rS=new THREE.Mesh(sGeo.clone(),mkMat()); rS.position.set(wS/2-tS/2,0,0); grp.add(rS);

    const pGeo=new THREE.BoxGeometry(iW,tS,dS);
    const addP=(y,name)=>{const m=new THREE.Mesh(pGeo.clone(),mkMat());m.position.set(0,y,0);m.name=name;grp.add(m);return m;};

    const btm=cfg.noBottom?null:addP(-hS/2+tS/2,'bottom');
    const top=cfg.noTop?null:addP(hS/2-tS/2,'top');
    const internals=[];
    if(N>0){
      const topT=cfg.noTop?0:tS, btmT=cfg.noBottom?0:tS;
      const avail=hS-topT-btmT, startY=-hS/2+btmT, gap=avail/(N+1);
      for(let i=1;i<=N;i++) internals.push(addP(startY+gap*i,'shelf_'+i));
    }

    // Strzałki dla zwykłych półek
    if(!cfg.isMugShelf && internals.length>0){
      const zF=dS/2+0.01;
      function mkLbl(txt,x,y,z){
        const cv=document.createElement('canvas');cv.width=256;cv.height=80;
        const ctx=cv.getContext('2d');
        ctx.fillStyle='rgba(220,252,231,0.96)';ctx.strokeStyle='#16a34a';ctx.lineWidth=4;
        ctx.beginPath();ctx.roundRect(3,3,250,74,12);ctx.fill();ctx.stroke();
        ctx.fillStyle='#15803d';ctx.font='bold 44px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(txt,128,40);
        const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthTest:false}));
        const sc=hS*0.16;sp.scale.set(sc,sc*0.32,1);sp.position.set(x,y,z);sp.renderOrder=999;grp.add(sp);
      }
      function ln(pts){grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts.map(p=>new THREE.Vector3(...p))),lineMat));}
      function vArr(x,y1,y2,z,lbl){
        const mid=(y1+y2)/2,cap=tS*0.8,as=tS*0.7;
        ln([[x,y1,z],[x,y2,z]]);ln([[x-cap,y1,z],[x+cap,y1,z]]);ln([[x-cap,y2,z],[x+cap,y2,z]]);
        ln([[x-as,y2-as*1.5,z],[x,y2,z],[x+as,y2-as*1.5,z]]);ln([[x-as,y1+as*1.5,z],[x,y1,z],[x+as,y1+as*1.5,z]]);
        mkLbl(lbl,x-hS*0.2,mid,z+0.02);
      }
      const xA=wS/2-tS*1.2;
      const sorted=[...internals].sort((a,b)=>a.position.y-b.position.y);
      const bY=btm?btm.position.y+tS/2:-hS/2;
      const tY=top?top.position.y-tS/2:hS/2;
      const levels=[{y1:bY,y2:sorted[0].position.y-tS/2}];
      for(let i=0;i<sorted.length-1;i++)levels.push({y1:sorted[i].position.y+tS/2,y2:sorted[i+1].position.y-tS/2});
      levels.push({y1:sorted[sorted.length-1].position.y+tS/2,y2:tY});
      levels.forEach(lv=>{const cm=Math.round((lv.y2-lv.y1)*10*10)/10;if(cm<0.5)return;vArr(xA,lv.y1,lv.y2,zF,Number.isInteger(cm)?cm+' cm':cm.toFixed(1)+' cm');});
    }

    // Przegródki pionowe dla półki na kubki
    if(cfg.isMugShelf && internals.length>0){
      const divTh=tS*0.8;
      const sorted=[...internals].sort((a,b)=>b.position.y-a.position.y);
      // Poziomy: top=między top a shelf[0], mid=między shelf[0] a shelf[1], bot=między shelf[1] a btm
      const bY=btm?btm.position.y+tS/2:-hS/2;
      const tY=top?top.position.y-tS/2:hS/2;
      const levels=[
        {y1:sorted[0]?sorted[0].position.y+tS/2:0, y2:tY, name:'top', active:cfg.divTop},
        {y1:sorted[1]?sorted[1].position.y+tS/2:0, y2:sorted[0]?sorted[0].position.y-tS/2:0, name:'mid', active:cfg.divMid},
        {y1:bY, y2:sorted[sorted.length-1]?sorted[sorted.length-1].position.y-tS/2:0, name:'bot', active:cfg.divBot},
      ];
      const numDiv=(W>=60)?3:2;
      levels.forEach(lv=>{
        if(!lv.active)return;
        const lvH=lv.y2-lv.y1;
        if(lvH<0.05)return;
        const yCenter=(lv.y1+lv.y2)/2;
        const dGeo=new THREE.BoxGeometry(divTh,lvH,dS*0.9);
        const cellW=iW/(numDiv+1);
        for(let d=1;d<=numDiv;d++){
          const xPos=-iW/2+cellW*d;
          const mesh=new THREE.Mesh(dGeo.clone(),mkMat());
          mesh.position.set(xPos,yCenter,0);
          grp.add(mesh);
        }
      });
    }
  }

  scene.add(grp);
  const b3=new THREE.Box3().setFromObject(grp);
  const cen=b3.getCenter(new THREE.Vector3()); grp.position.sub(cen);
  const sz=b3.getSize(new THREE.Vector3());
  const fov2=camera.fov*Math.PI/180;
  const fd=Math.max(sz.x,sz.y)/(2*Math.tan(fov2/2))*1.7;
  camera.position.set(-sz.x*0.5,sz.y*0.05,fd); camera.lookAt(0,0,0);
  const ctrl=new THREE.OrbitControls(camera,renderer.domElement);
  ctrl.enableDamping=true;ctrl.dampingFactor=0.08;ctrl.enableZoom=true;
  ctrl.minPolarAngle=Math.PI*0.42;ctrl.maxPolarAngle=Math.PI*0.42;
  let raf;(function loop(){raf=requestAnimationFrame(loop);ctrl.update();renderer.render(scene,camera);})();
  return()=>cancelAnimationFrame(raf);
}

  (order.products||[]).forEach(p=>{

      const qty=parseInt(p.quantity)||1;
      for(let q=0;q<qty;q++) allCodes.push(p.sku.trim());
    }
  });

  // 2. ZAPASOWE: user_comments — blok "Kod konfiguracji:\n..."
  if(allCodes.length===0){
    const commentBlock = comments.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    const codeSection = commentBlock.match(/Kod konfiguracji:\s*\n([\s\S]+)/i);
    if(codeSection){
      codeSection[1].split('\n').forEach(line=>{
        const c=line.trim();
        if(c && c.length>3 && /^[a-zA-Z]/.test(c)) allCodes.push(c);
      });
    }
  }

  // 3. OSTATECZNY FALLBACK: pojedynczy kod z komentarza
  if(allCodes.length===0){
    const single=comments.match(/Kod(?:\s+konfiguracji)?:\s*([^\n\r]+)/i);

                    <div style="font-size:.68rem;color:#9ca3af">szt. ${p.quantity||1}</div>
                  </div>
                </div>
                <div style="font-size:.82rem;font-weight:600;color:#111827;flex-shrink:0">${parseFloat(p.price_brutto||0).toFixed(2).replace('.',',')} zł</div>
              </div>`).join('')}
            </div>
          </div>`:''}
          <div class="sum-total" style="flex-direction:column;align-items:stretch;gap:0;padding:12px 20px;">
            ${shipping>0?`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:.8rem;"><span style="color:#6b7280;">Dostawa</span><span style="font-weight:500;color:#111827;">${shipping.toFixed(2).replace('.',',')} zł</span></div>`:''}
            ${discount>0?`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:.8rem;"><span style="color:#6b7280;">Rabat</span><span style="font-weight:500;color:#16a34a;">−${discount.toFixed(2).replace('.',',')} zł</span></div>`:''}
            ${(shipping>0||discount>0)?`<div style="border-top:1px solid #bbf7d0;margin:8px 0;"></div>`:''}
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span class="lbl">Zapłacono</span>
              <span class="val">${total.toFixed(2).replace('.',',')} zł</span>
            </div>
          </div>
        </div>
      </div>

      <!-- STREFA 3: 3D -->
      <div class="col-3d">
        ${threeDCards}
      </div>

      <!-- STREFA 4: KONTAKT -->
      <div class="col-contact">
        <div class="summary-card">
          <div class="sum-section">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
              <div style="display:flex;align-items:center;gap:6px;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <span style="font-size:.85rem;font-weight:600;color:#111827;">Masz pytanie?</span>
              </div>
              <a href="mailto:nowywymiar2@gmail.com" style="display:inline-flex;align-items:center;gap:7px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:9px;padding:8px 14px;text-decoration:none;" onmouseover="this.style.background='#dcfce7'" onmouseout="this.style.background='#f0fdf4'">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <span style="font-size:.8rem;font-weight:600;color:#15803d;white-space:nowrap;">nowywymiar2@gmail.com</span>
              </a>
            </div>
          </div>
        </div>
      </div>

    </div>`;

  startCountdown(delivDate);

  // Wstrzyknij dane do topbara
  const tbInfo = document.getElementById('topbar-orderinfo');
  const tbPill = document.getElementById('topbar-statuspill');
  const tbLabel = step>=2 ? 'Wysłano' : step>=1 ? 'W produkcji' : 'W produkcji';
  if(tbInfo) tbInfo.textContent = '#' + order.order_id + ' · ' + total.toFixed(2).replace('.',',') + ' zł';
  if(tbPill){ tbPill.style.display = 'none'; }

  // Init 3D canvases tylko dla produktów bez snapshotu
  if(cfgs.length>0){
    cfgs.forEach((item,idx)=>{
      const snap = (window._orderSnapshots||[]).find(s=>s.code===item.code);
      if(snap?.snapshot) return; // Ma snapshot — pomijamy 3D
      requestAnimationFrame(()=>{requestAnimationFrame(()=>{
        const canvas=document.getElementById('shelfCanvas-'+idx);
        if(!canvas)return;
        const wrap=document.getElementById('viewer-wrap-'+idx);
        if(!wrap)return;
        const rect=wrap.getBoundingClientRect();
        canvas.width=rect.width*window.devicePixelRatio;
        canvas.height=rect.height*window.devicePixelRatio;
        canvas.style.width=rect.width+'px';
        canvas.style.height=rect.height+'px';
        try{
          build3D(canvas,item.cfg);
          setTimeout(()=>{
            const ov=document.getElementById('vov-'+idx);
            if(ov)ov.classList.add('gone');
          },700+idx*200);
        }catch(e){console.error('3D error idx='+idx,e);}
      });});
    });
  }
}

function showLoading(){document.getElementById('root').innerHTML=`<div class="state"><div class="spin" style="width:40px;height:40px"></div><div class="state-title" style="margin-top:14px">Ładuję zamówienie…</div><div class="state-desc">Pobieramy dane z systemu</div></div>`;}
function showError(t,d){document.getElementById('root').innerHTML=`<div class="state"><div class="state-icon" style="background:#fef2f2"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="state-title">${t}</div><div class="state-desc">${d}</div></div>`;}

async function main(){
  showLoading();
  const id=new URLSearchParams(location.search).get('id');
  if(!id){showError('Brak numeru zamówienia','Sprawdź link z e-maila — powinien zawierać numer zamówienia.');return;}
  try{
    const[oRes,sRes,iRes]=await Promise.all([
      fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({method:'getOrders',parameters:{order_id:parseInt(id)}})}),
      fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({method:'getOrderStatusList',parameters:{}})}),
      fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({method:'getInvoices',parameters:{order_id:parseInt(id)}})})
    ]);
    const[oData,sData,iData]=await Promise.all([oRes.json(),sRes.json(),iRes.json()]);
    if(oData.status!=='SUCCESS'||!oData.orders?.length){showError(`Zamówienie #${id} nie znalezione`,'Sprawdź poprawność linku lub skontaktuj się z nami.');return;}
    const order=oData.orders[0];
    let sName='Nowe zamówienia';
    if(sData.status==='SUCCESS'){const f=sData.statuses?.find(s=>s.id==order.order_status_id);if(f)sName=f.name;}
    // Pobierz fakturę i snapshoty równolegle
    const invoice=(iData.status==='SUCCESS'&&iData.invoices?.length)?iData.invoices[0]:null;

    // Pobierz snapshoty z backendu
    try {
      const snRes = await fetch(`https://polki-backend-production.up.railway.app/api/order-snapshots?bl_order_id=${id}`);
      const snData = await snRes.json();
      window._orderSnapshots = snData.snapshots || [];
    } catch(e) { window._orderSnapshots = []; }

    renderPage(order,sName,order.delivery_package_nr||null,invoice);
  }catch(e){showError('Błąd połączenia','Nie udało się pobrać danych. Odśwież stronę za chwilę.');}
}
main();
</script>
